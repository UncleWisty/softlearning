spring.application.name=softlearning
server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/softlearning
spring.datasource.username=lorien
spring.datasource.password=lorien
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.orm.format_sql=true
spring.jpa.properties.hibernate.orm.use_sql_comments=true
spring.jpa.properties.hibernate.orm.dialect=org.hibernate.dialect.mysql